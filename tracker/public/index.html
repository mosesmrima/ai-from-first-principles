<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Study</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <h1 class="app-title">AI Curriculum</h1>
      <div class="header-chips"><span id="streak-chip" class="chip streak" hidden></span><span id="track-chip" class="chip" hidden></span></div>
    </div>
    <div class="progress-track" aria-hidden="true"><div id="progress-fill" class="progress-fill"></div></div>
    <p id="progress-meta" class="progress-meta"></p>
  </header>

  <nav class="tabs" role="tablist" aria-label="Sections">
    <button class="tab is-active" role="tab" aria-selected="true" data-tab="now" id="tab-now">Now</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="plan" id="tab-plan">Plan</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="settings" id="tab-settings">Settings</button>
  </nav>

  <main id="root">
    <section id="view-now" class="view" role="tabpanel" aria-labelledby="tab-now"></section>
    <section id="view-plan" class="view" role="tabpanel" aria-labelledby="tab-plan" hidden></section>
    <section id="view-settings" class="view" role="tabpanel" aria-labelledby="tab-settings" hidden></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
